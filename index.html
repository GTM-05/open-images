<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Jessy 💜</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#240046,#5a189a,#9d4edd,#ff4fd8);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

/* Background Animation */

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Balloons */

.balloon{
position:absolute;
bottom:-150px;
width:70px;
height:90px;
border-radius:50%;
animation:float 10s linear infinite;
opacity:.8;
}

.balloon::before{
content:'';
position:absolute;
width:2px;
height:90px;
background:white;
left:50%;
top:90px;
}

.b1{left:5%;background:#ff4fd8;animation-delay:0s;}
.b2{left:25%;background:#9d4edd;animation-delay:2s;}
.b3{left:45%;background:#ff66c4;animation-delay:4s;}
.b4{left:70%;background:#ff00cc;animation-delay:1s;}
.b5{left:90%;background:#ffc6ff;animation-delay:3s;}

@keyframes float{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-130vh);
}
}

/* Card */

.card{
width:380px;
padding:25px;
border-radius:30px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
text-align:center;
border:2px solid rgba(255,255,255,0.2);
box-shadow:0 0 40px rgba(255,255,255,0.3);
}

/* Image */

.profile{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
border:6px solid white;
box-shadow:0 0 25px #ff8ae2;
}

/* Text */

h1{
margin-top:18px;
font-size:42px;
color:white;
text-shadow:0 0 20px #ff66d9;
}

.name{
margin-top:10px;
font-size:34px;
font-weight:bold;
color:#fff;
}

.message{
margin-top:18px;
font-size:18px;
line-height:1.8;
color:#ffeaff;
}

.footer{
margin-top:20px;
font-size:22px;
color:white;
}

/* Hearts */

.heart{
position:absolute;
font-size:24px;
animation:heart 8s linear infinite;
}

@keyframes heart{
0%{
transform:translateY(0);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

</style>
</head>

<body>

<!-- Balloons -->

<div class="balloon b1"></div>
<div class="balloon b2"></div>
<div class="balloon b3"></div>
<div class="balloon b4"></div>
<div class="balloon b5"></div>

<!-- Hearts -->

<div class="heart" style="left:10%;bottom:-10%">💖</div>
<div class="heart" style="left:30%;bottom:-20%">✨</div>
<div class="heart" style="left:55%;bottom:-15%">💜</div>
<div class="heart" style="left:80%;bottom:-10%">🌸</div>

<!-- Main Card -->

<div class="card">

<img
src="birthday-photo.jpeg"
class="profile"
alt="Jessy">

<h1>Happy Birthday</h1>

<div class="name">Jessy 💜</div>

<div class="message">
Our beautiful HelloTalk Sago ✨<br><br>

Your smile is magical,<br>
your vibe is unforgettable 💖<br><br>

May your life always be filled with<br>
happiness, love & cute memories 🌸
</div>

<div class="footer">
— From Your Friends / Sago 💫
</div>

</div>

</body>
</html>
